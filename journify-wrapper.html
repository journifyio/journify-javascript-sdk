<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <!--
    JOURNIFY PIXEL WRAPPER
    ======================
    Load this script BEFORE any pixel SDK (fbq / ttq / snaptr) and BEFORE
    the Journify SDK snippet below.

    Architecture
    ------------
    1. Intercepts customer pixel calls (fbq, ttq.track, snaptr).
    2. Suppresses the original call so the pixel does not fire directly.
    3. Forwards the event to journify.track / journify.page instead.
    4. The Journify SDK routes the event through its plugins; each plugin
       re-fires its own pixel with the SDK-generated messageId as eventId
       (enabling server-side deduplication at CAPI).

    Loop prevention — window.__jf.pixels
    -------------------------------------
    When a plugin re-fires its pixel (e.g. fbq, snaptr), the wrapper must
    NOT intercept that call again or we get an infinite loop.

    Solution: before wrapping each pixel function, we capture the original
    (pre-wrap) reference and expose it under window.__jf.pixels:

      window.__jf.pixels.fbq         → calls original Facebook callMethod directly
      window.__jf.pixels.snaptr      → the original snaptr function
      window.__jf.pixels.ttqInstance → returns a raw, unwrapped TikTok instance

    Plugins use these bypass references so their re-fire calls are never seen
    by this interceptor — no global sentinel flag needed.
  -->
  <script>
    (function () {
      'use strict';

      // ── Interceptor config ───────────────────────────────────────────────────
      // Set a pixel to false to disable interception entirely for that vendor.
      // When disabled, the pixel fires normally and is never forwarded to Journify.
      var ENABLED_PIXELS = {
        facebook: true,
        snapchat: true,
        tiktok:   true,
      };

      // ── Bypass namespace ─────────────────────────────────────────────────────
      // Journify plugins read window.__jf.pixels.fbq / .snaptr to call the real
      // pixel function directly, bypassing this interceptor.
      window.__jf = window.__jf || {};
      window.__jf.pixels = window.__jf.pixels || {};


      // ── Journify dispatch ────────────────────────────────────────────────────
      // Sends an intercepted pixel event through the Journify SDK.
      // The Journify snippet below creates window.journify as a stub that queues
      // calls until the real SDK loads, so no additional buffering is needed here.
      function dispatchToJournify(method, eventName, props) {
        var journify = window.journify;
        console.log('[JF:DISPATCH] method:', method, '| eventName:', eventName, '| props:', JSON.stringify(props), '| journify available:', !!journify);
        if (!journify) {
          console.warn('[JF:DISPATCH] window.journify not found — call dropped');
          return;
        }
        if (typeof journify[method] === 'function') {
          console.log('[JF:DISPATCH] calling journify.' + method + '(', eventName, ',', props, ')');
          journify[method](eventName, props);
        } else {
          console.log('[JF:DISPATCH] journify.' + method + ' not a function — pushing to stub queue');
          journify.push([method, eventName, props]);
        }
      }


      // ════════════════════════════════════════════════════════════════════════
      // FACEBOOK  (window.fbq)
      // ════════════════════════════════════════════════════════════════════════
      //
      // Facebook pixel routes all calls through an internal `callMethod` on the
      // fbq stub. We intercept at that level so we capture both the initial
      // queue flush (when fbevents.js loads) and all subsequent calls.
      //
      // Bypass: window.__jf.pixels.fbq is set to a thin wrapper that calls the
      // ORIGINAL callMethod directly, skipping our interceptor entirely.
      // ════════════════════════════════════════════════════════════════════════

      // All fbq methods that represent user-facing tracking calls.
      var FBQ_TRACK_METHODS = {
        track: true,
        trackCustom: true,
        trackSingle: true,
        trackSingleCustom: true,
      };

      // Decide whether to suppress an fbq call and, if so, forward to Journify.
      // Returns true  → let the call through to the real fbq (init, consent, etc.)
      // Returns false → suppress (tracking call, forwarded to Journify instead)
      function shouldPassFbqThrough(args) {
        var method = args[0];
        console.log('[JF:FB] interceptor received — method:', method, '| full args:', args);

        if (!FBQ_TRACK_METHODS[method]) {
          console.log('[JF:FB] non-tracking method "' + method + '" — passing through to real fbq');
          return true; // non-tracking call (init, consent, revokeConsent…) — let through
        }

        // trackSingle / trackSingleCustom carry an explicit pixelId at args[1],
        // pushing the event name to args[2]. track / trackCustom have the event
        // name at args[1].
        var eventNameIndex = (method === 'trackSingle' || method === 'trackSingleCustom') ? 2 : 1;
        var eventName = args[eventNameIndex];
        var props = Object.assign({}, args[eventNameIndex + 1] || {});

        console.log('[JF:FB] suppressing fbq call — dispatching to journify | eventName:', eventName, '| props:', JSON.stringify(props));
        props._sourceWrapper = 'facebook';
        dispatchToJournify('track', eventName, props);
        return false; // suppress — plugin will re-fire via window.__jf.pixels.fbq
      }

      // Given the ORIGINAL callMethod, build:
      //   • the intercepting callMethod (installed on the stub), and
      //   • the bypass (stored on window.__jf.pixels.fbq).
      function buildFbqCallMethodInterceptor(fbqStub, originalCallMethod) {
        console.log('[JF:FB] buildFbqCallMethodInterceptor — installing bypass and intercepting callMethod');
        // Bypass: calling this invokes the real Facebook SDK without interception.
        window.__jf.pixels.fbq = function () {
          return originalCallMethod.apply(fbqStub, arguments);
        };

        // Intercepting callMethod — replaces stub.callMethod.
        return function () {
          var args = Array.prototype.slice.call(arguments);
          if (shouldPassFbqThrough(args)) {
            return originalCallMethod.apply(fbqStub, args);
          }
          // else: suppressed — Journify plugin re-fires with proper eventId
        };
      }

      function wrapFbq(fbqStub) {
        console.log('[JF:FB] wrapFbq called — already wrapped:', !!fbqStub.__jfWrapped, '| has callMethod:', typeof fbqStub.callMethod);
        if (fbqStub.__jfWrapped) return fbqStub;

        if (typeof fbqStub.callMethod === 'function') {
          // fbevents.js already set callMethod — intercept it now.
          fbqStub.callMethod = buildFbqCallMethodInterceptor(fbqStub, fbqStub.callMethod);
        } else {
          // callMethod will be assigned later by fbevents.js.
          // Trap the property so we intercept the moment it is set.
          var interceptingCallMethod; // holds the wrapped version
          Object.defineProperty(fbqStub, 'callMethod', {
            configurable: true,
            enumerable: true,
            get: function () { return interceptingCallMethod; },
            set: function (realCallMethod) {
              interceptingCallMethod = buildFbqCallMethodInterceptor(fbqStub, realCallMethod);
              // Convert back to a plain writable property — fbevents.js only sets
              // callMethod once, so we no longer need the defineProperty trap.
              Object.defineProperty(fbqStub, 'callMethod', {
                configurable: true,
                enumerable: true,
                writable: true,
                value: interceptingCallMethod,
              });
            },
          });
        }

        fbqStub.__jfWrapped = true;
        return fbqStub; // same object, modified in place
      }


      // ════════════════════════════════════════════════════════════════════════
      // SNAPCHAT  (window.snaptr)
      // ════════════════════════════════════════════════════════════════════════
      //
      // snaptr is a plain function. We replace window.snaptr with a wrapper and
      // store the original as window.__jf.pixels.snaptr for plugin bypass.
      //
      // handleRequest proxy: the Snapchat SDK (scevent.min.js) sets
      // snaptr.handleRequest on whatever window.snaptr points to at load time
      // (= our wrapper). We proxy that assignment back to the original so that
      // when the plugin calls window.__jf.pixels.snaptr(…) the original stub
      // also has handleRequest and can invoke the real SDK.
      // ════════════════════════════════════════════════════════════════════════

      function wrapSnaptr(originalSnaptr) {
        if (originalSnaptr.__jfWrapped) return originalSnaptr;

        // Store original for plugin bypass.
        window.__jf.pixels.snaptr = originalSnaptr;

        var wrapper = function () {
          var args = Array.prototype.slice.call(arguments);
          var method = args[0];
          console.log('[JF:SNAP] interceptor received — method:', method, '| full args:', args);

          if (method !== 'track') {
            // init and other lifecycle calls — pass through to real snaptr.
            console.log('[JF:SNAP] non-track method "' + method + '" — passing through to real snaptr');
            return originalSnaptr.apply(window, args);
          }

          // snaptr supports two call signatures:
          //   snaptr('track', eventName, props)
          //   snaptr('track', pixelId, eventName, props)
          // Distinguish by checking whether args[2] is a string (= eventName in the second form).
          var eventName, props;
          if (typeof args[2] === 'string') {
            // Second form: pixelId at args[1], eventName at args[2], props at args[3].
            console.log('[JF:SNAP] detected pixelId-prefixed signature — pixelId:', args[1]);
            eventName = args[2] || 'Unknown';
            props = Object.assign({}, args[3] || {});
          } else {
            // First form: eventName at args[1], props at args[2].
            console.log('[JF:SNAP] detected plain signature');
            eventName = args[1] || 'Unknown';
            props = Object.assign({}, args[2] || {});
          }
          console.log('[JF:SNAP] suppressing snaptr call — dispatching to journify | eventName:', eventName, '| props:', JSON.stringify(props));
          props._sourceWrapper = 'snapchat';
          dispatchToJournify('track', eventName, props);
          // Suppress — plugin re-fires via window.__jf.pixels.snaptr(…)
        };

        // Copy existing own properties from the original (queue, etc.)
        // so the Snapchat SDK finds them on window.snaptr (= wrapper).
        for (var key in originalSnaptr) {
          if (Object.prototype.hasOwnProperty.call(originalSnaptr, key)) {
            wrapper[key] = originalSnaptr[key];
          }
        }

        // Proxy handleRequest: the Snapchat SDK sets this on window.snaptr (= wrapper).
        // Forward every assignment to the original so plugin bypass calls work correctly.
        Object.defineProperty(wrapper, 'handleRequest', {
          configurable: true,
          enumerable: true,
          get: function () { return originalSnaptr.handleRequest; },
          set: function (fn) { originalSnaptr.handleRequest = fn; },
        });

        wrapper.__jfWrapped = true;
        return wrapper; // replaces window.snaptr
      }


      // ════════════════════════════════════════════════════════════════════════
      // TIKTOK  (window.ttq)
      // ════════════════════════════════════════════════════════════════════════
      //
      // We intercept:
      //   • ttq.track(…) and ttq.page(…)  — top-level calls
      //   • ttq.instance(pixelCode).track/page(…) — per-pixel sub-object calls
      //
      // Bypass — window.__jf.pixels.ttqInstance
      // The Journify TikTok plugin re-fires via ttq.instance(pixelCode).track(…).
      // If we wrapped instances without a bypass, the plugin call would be
      // re-intercepted → journify.track fires again → plugin fires again → ∞ loop.
      //
      // Solution: before wrapping ttq.instance, we capture the original function
      // and expose it as window.__jf.pixels.ttqInstance. When the plugin calls
      // this bypass, it gets a RAW unwrapped instance whose track/page methods
      // are not intercepted — so the re-fire reaches the real TikTok SDK directly.
      //
      // The _origInstance variable is shared between the bypass closure and the
      // defineProperty setter: if the TikTok SDK later assigns a new instance
      // function (ttq.instance = newFn), _origInstance updates automatically and
      // window.__jf.pixels.ttqInstance continues returning correct raw instances.
      //
      // Lazy re-wrap: the TikTok SDK sometimes redefines ttq.track/page via
      // Object.defineProperty after the stub has been set up. The window.ttq
      // getter detects this (by comparing stored getter references) and re-applies
      // our trap automatically.
      // ════════════════════════════════════════════════════════════════════════

      var TTQ_METHODS_TO_INTERCEPT = ['track', 'page'];

      // Traps a single method on ttqObj using a getter so we can detect
      // if the TikTok SDK later overwrites it.
      function trapTtqMethod(ttqObj, method) {
        var underlyingFn = typeof ttqObj[method] === 'function' ? ttqObj[method] : null;
        var objLabel = ttqObj.__jfLabel || 'top-level';

        function interceptor() {
          var args = Array.prototype.slice.call(arguments);
          var isPage = (method === 'page');
          var eventName = isPage ? 'PageView' : (args[0] || 'Unknown');
          var props     = isPage ? {} : Object.assign({}, args[1] || {});
          console.log('[JF:TTQ] interceptor fired', {
            object: objLabel,
            method: method,
            eventName: eventName,
            args: args,
          });
          props._sourceWrapper = 'tiktok';
          dispatchToJournify(isPage ? 'page' : 'track', eventName, props);
        }

        var getterFn = function () { return interceptor; };

        try {
          Object.defineProperty(ttqObj, method, {
            configurable: true,
            enumerable: true,
            get: getterFn,
            set: function (newFn) {
              console.log('[JF:TTQ] SDK overwrote', method, 'on', objLabel, '— will re-trap on next access');
              underlyingFn = newFn;
            },
          });
        } catch (e) {
          console.warn('[JF:TTQ] defineProperty failed for', method, 'on', objLabel, '— using direct assignment', e);
          ttqObj[method] = interceptor;
          getterFn = null;
        }

        if (!ttqObj.__jfGetters) ttqObj.__jfGetters = {};
        ttqObj.__jfGetters[method] = getterFn;
      }

      // Wraps only track and page on ttqObj.
      // ttq.instance is NOT intercepted — the bypass in window.__jf.pixels.ttqInstance
      // is used exclusively by the Journify TikTok plugin to re-fire events.
      function wrapTtqObject(ttqObj) {
        console.log('[JF:TTQ] wrapTtqObject called on', ttqObj.__jfLabel || 'top-level', '— already wrapped:', !!ttqObj.__jfWrapped);
        TTQ_METHODS_TO_INTERCEPT.forEach(function (method) {
          trapTtqMethod(ttqObj, method);
        });
        ttqObj.__jfWrapped = true;
        console.log('[JF:TTQ] wrapTtqObject done on', ttqObj.__jfLabel || 'top-level');
      }

      function installTtqTrap() {
        var ttqValue = window.ttq;

        // Expose ttq.instance as a passthrough for the Journify TikTok plugin.
        // The plugin calls window.__jf.pixels.ttqInstance(pixelCode) to get a raw
        // instance and re-fire directly — instance calls are not intercepted by
        // this wrapper, so no bypass flag or shim is needed.
        window.__jf.pixels.ttqInstance = function (pixelCode) {
          if (!ttqValue || typeof ttqValue.instance !== 'function') {
            console.warn('[JF:TTQ] ttqInstance bypass called but ttqValue.instance not available');
            return null;
          }
          console.log('[JF:TTQ] ttqInstance bypass called for pixelCode:', pixelCode);
          return ttqValue.instance(pixelCode);
        };

        function wrapWhenReady(val) {
          if (typeof val.track === 'function') {
            console.log('[JF:TTQ] wrapWhenReady — track is a function, wrapping now');
            wrapTtqObject(val);
          } else {
            console.log('[JF:TTQ] wrapWhenReady — track not yet a function, deferring one tick');
            setTimeout(function () {
              if (!val.__jfWrapped) {
                console.log('[JF:TTQ] deferred wrap — wrapping now');
                wrapTtqObject(val);
              } else {
                console.log('[JF:TTQ] deferred wrap — already wrapped, skipping');
              }
            }, 0);
          }
        }

        if (ttqValue && !ttqValue.__jfWrapped) wrapWhenReady(ttqValue);

        Object.defineProperty(window, 'ttq', {
          configurable: true,
          enumerable: true,
          get: function () {
            if (ttqValue && ttqValue.__jfGetters) {
              var needsRewrap = false;
              var rewrapReason = '';
              for (var method in ttqValue.__jfGetters) {
                var storedGetter = ttqValue.__jfGetters[method];
                if (!storedGetter) continue;
                var descriptor = Object.getOwnPropertyDescriptor(ttqValue, method);
                if (!descriptor || descriptor.get !== storedGetter) {
                  needsRewrap = true;
                  rewrapReason = method + ' getter replaced';
                  break;
                }
              }
              if (needsRewrap) {
                console.log('[JF:TTQ] lazy re-wrap triggered —', rewrapReason);
                ttqValue.__jfWrapped = false;
                delete ttqValue.__jfGetters;
                wrapTtqObject(ttqValue);
              }
            }
            return ttqValue;
          },
          set: function (newVal) {
            console.log('[JF:TTQ] window.ttq reassigned — wrapping if needed');
            ttqValue = newVal;
            if (newVal && !newVal.__jfWrapped) wrapWhenReady(newVal);
          },
        });

        console.log('[JF:TTQ] installTtqTrap complete — initial ttqValue:', !!ttqValue);
      }


      // ── Generic window[name] trap ────────────────────────────────────────────
      // If window[name] already has a value, wrap it immediately.
      // Otherwise install a defineProperty setter that wraps it on first assignment
      // and then converts back to a plain writable property (one-shot trap).
      function installWindowTrap(globalName, wrapFn) {
        var current = window[globalName];
        if (current) {
          window[globalName] = wrapFn(current);
          return;
        }

        var wrappedValue;
        var isTrapped = true;
        Object.defineProperty(window, globalName, {
          configurable: true,
          enumerable: true,
          get: function () { return wrappedValue; },
          set: function (newVal) {
            if (isTrapped && newVal && !newVal.__jfWrapped) {
              wrappedValue = wrapFn(newVal);
              wrappedValue.__jfWrapped = true;
              isTrapped = false;
              // Release the trap — subsequent assignments go directly.
              Object.defineProperty(window, globalName, {
                configurable: true,
                enumerable: true,
                writable: true,
                value: wrappedValue,
              });
            } else {
              wrappedValue = newVal;
            }
          },
        });
      }


      // ── Install all interceptors ─────────────────────────────────────────────
      if (ENABLED_PIXELS.facebook) installWindowTrap('fbq', wrapFbq);
      if (ENABLED_PIXELS.snapchat) installWindowTrap('snaptr', wrapSnaptr);
      if (ENABLED_PIXELS.tiktok)   installTtqTrap();

    })();
  </script>

  <!--
    JOURNIFY SDK
    Replace writeKey / apiHost / cdnHost for your environment.
    This snippet creates window.journify as a stub that queues track/page/etc.
    calls until the real SDK loads — so the wrapper above can dispatch to it
    immediately without waiting.
  -->
  <script>
    !(function () {
      var journify = (window.journify = window.journify || []); var localJournify;
      if (!journify.load) {
        if (journify.invoked) { console.error("Journify snippet included twice."); } else {
          journify.invoked = !0;
          journify.methods = ["track","identify","group","page"];
          journify.factory = function (m) { return function () { var a = Array.prototype.slice.call(arguments); a.unshift(m); journify.push(a); return journify; }; };
          for (var i = 0; i < journify.methods.length; i++) { var mn = journify.methods[i]; journify[mn] = journify.factory(mn); }
          journify.load = function (s) {
            var sc = document.createElement("script"); sc.type = "text/javascript"; sc.async = !0;
            sc.src = "https://static.journify.io/@journifyio/js-sdk@latest/journifyio.min.js";
            localJournify = journify;
            sc.onload = function () {
              window.journify.load(s);
              for (var i = 0; i < localJournify.length; i++) {
                var ca = localJournify[i]; var mn = ca.shift();
                if (!window.journify[mn]) return;
                window.journify[mn].apply(this, ca);
              }
            };
            var fs = document.getElementsByTagName("script")[0]; fs.parentNode.insertBefore(sc, fs);
          };
          journify.load({ writeKey: "YOUR_WRITE_KEY", apiHost: "https://t.journify.io", cdnHost: "https://static.journify.io" });
        }
      }
    })();
  </script>
</head>
